# ─── Search Queries ──────────────────────────────────────────────────────────
# On all *SearchInput types: omit `limit` for the default page size (20).
# Pass `limit: null` to return every matching row (after `offset`). `offset` may be 0.

enum SearchMode {
  NONE
  LEXICAL
  SEMANTIC
  HYBRID
}

input PodcastSearchInput {
  mode: SearchMode = NONE
  query: String
  limit: Int = 20
  offset: Int = 0
  isPublished: Boolean
  language: String
}

